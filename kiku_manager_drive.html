<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIKU 회원 관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9a9a9a;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:8px;--radius-lg:12px;
  --danger-bg:#FCEBEB;--danger:#A32D2D;--danger-border:#F09595;
  --warn-bg:#FAEEDA;--warn:#854F0B;--warn-border:#EF9F27;
  --info-bg:#E6F1FB;--info:#185FA5;--info-border:#85B7EB;
  --success-bg:#EAF3DE;--success:#3B6D11;--success-border:#97C459;
  --purple-bg:#EEEDFE;--purple:#534AB7;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2a2a28;
    --text:#f0efe9;--text2:#9a9a90;--text3:#6b6b65;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
    --danger-bg:#3a1a1a;--danger:#F09595;--danger-border:#791F1F;
    --warn-bg:#3a2e10;--warn:#FAC775;--warn-border:#633806;
    --info-bg:#0e1e36;--info:#85B7EB;--info-border:#0C447C;
    --success-bg:#162310;--success:#97C459;--success-border:#27500A;
    --purple-bg:#1e1c3a;--purple:#AFA9EC;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
.app{max-width:820px;margin:0 auto;padding:1.5rem 1rem}
.header{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.save-bar{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:10px 16px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.save-status{font-size:12px;color:var(--text2)}
.tabs{display:flex;gap:4px;margin-bottom:0;border-bottom:0.5px solid var(--border);background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:0 1rem}
.tab{padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.active{color:var(--text);font-weight:500;border-bottom:2px solid var(--text)}
.tab:hover:not(.active){color:var(--text)}
.tab i{margin-right:4px;font-size:15px;vertical-align:-2px}
.tab-content{background:var(--bg);border:0.5px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.section{display:none}.section.active{display:block}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1rem}
.metric{background:var(--bg2);border-radius:var(--radius);padding:1rem;text-align:center}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500}
.metric-value.danger{color:var(--danger)}
.metric-value.warning{color:var(--warn)}
.metric-value.success{color:var(--success)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--radius);font-weight:500}
.badge-ghost{background:var(--danger-bg);color:var(--danger)}
.badge-safe{background:var(--success-bg);color:var(--success)}
.badge-new{background:var(--info-bg);color:var(--info)}
.badge-contact{background:var(--purple-bg);color:var(--purple)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);font-size:12px}
td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.btn{padding:6px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:none;cursor:pointer;font-size:13px;color:var(--text);transition:background 0.1s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{opacity:0.85}
.btn-danger{color:var(--danger);border-color:var(--danger-border)}
.btn-danger:hover{background:var(--danger-bg)}
.btn-success{color:var(--success);border-color:var(--success-border)}
.btn-success:hover{background:var(--success-bg)}
.btn-warn{color:var(--warn);border-color:var(--warn-border)}
.btn-warn:hover{background:var(--warn-bg)}
.btn-sm{padding:3px 10px;font-size:12px}
.btn i{font-size:14px;vertical-align:-2px;margin-right:3px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-group label{font-size:12px;color:var(--text2);font-weight:500}
input[type=text],input[type=date],select{width:100%;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text)}
input:focus{outline:none;border-color:var(--text);box-shadow:0 0 0 2px rgba(0,0,0,0.06)}
.alert{padding:11px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.alert i{font-size:16px;flex-shrink:0;margin-top:1px}
.alert-danger{background:var(--danger-bg);color:var(--danger);border:0.5px solid var(--danger-border)}
.alert-warning{background:var(--warn-bg);color:var(--warn);border:0.5px solid var(--warn-border)}
.alert-info{background:var(--info-bg);color:var(--info);border:0.5px solid var(--info-border)}
.alert-success{background:var(--success-bg);color:var(--success);border:0.5px solid var(--success-border)}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.mb-1{margin-bottom:8px}.mb-2{margin-bottom:16px}
.text-secondary{color:var(--text2)}
.text-sm{font-size:12px}
.divider{border:none;border-top:0.5px solid var(--border);margin:1rem 0}
.member-row-ghost td{background:var(--danger-bg) !important}
.contact-check{width:14px;height:14px;cursor:pointer;accent-color:var(--purple)}
.modal-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:500;margin-bottom:1rem}
h3{font-size:15px;font-weight:500;margin-bottom:10px}
.section-label{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
.empty-state{padding:2rem;text-align:center;color:var(--text2);font-size:13px}
.empty-state i{font-size:32px;display:block;margin-bottom:8px;opacity:0.4}
.bung-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:10px}
.attendee-scroll{max-height:180px;overflow-y:auto;border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px}
.attendee-label{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;font-size:13px}
.drive-status{display:flex;align-items:center;gap:6px;font-size:12px}
.drive-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.drive-dot.connected{background:var(--success)}
.drive-dot.disconnected{background:var(--text3)}
.drive-dot.loading{background:var(--warn);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@media(max-width:480px){.form-row{grid-template-columns:1fr}.tabs{overflow-x:auto}.tab{padding:10px 10px;font-size:12px}}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="flex-between">
      <div>
        <div style="font-size:18px;font-weight:500">🎤 KIKU 회원 관리</div>
        <div class="text-sm text-secondary" id="calc-date-display" style="margin-top:2px"></div>
      </div>
    </div>
  </div>

  <div class="save-bar">
    <div class="drive-status">
      <div class="drive-dot disconnected" id="drive-dot"></div>
      <span class="save-status" id="save-status">Google Drive 연결 안 됨</span>
    </div>
    <div class="flex" style="gap:6px;flex-wrap:wrap">
      <button class="btn btn-sm" id="btn-login" onclick="driveLogin()"><i class="ti ti-brand-google"></i> Google 로그인</button>
      <button class="btn btn-sm" id="btn-logout" onclick="driveLogout()" style="display:none"><i class="ti ti-logout"></i> 로그아웃</button>
      <button class="btn btn-sm btn-success" id="btn-save" onclick="driveSave()" style="display:none"><i class="ti ti-cloud-upload"></i> 드라이브에 저장</button>
      <button class="btn btn-sm" id="btn-load" onclick="driveLoad()" style="display:none"><i class="ti ti-cloud-download"></i> 드라이브에서 불러오기</button>
      <button class="btn btn-sm btn-warn" onclick="exportLocal()"><i class="ti ti-download"></i> 로컬 백업</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard')"><i class="ti ti-layout-dashboard"></i>대시보드</button>
    <button class="tab" onclick="switchTab('members')"><i class="ti ti-users"></i>회원 명단</button>
    <button class="tab" onclick="switchTab('bung')"><i class="ti ti-calendar-event"></i>벙 관리</button>
    <button class="tab" onclick="switchTab('ghost')"><i class="ti ti-ghost"></i>유령 정리</button>
  </div>

  <div class="tab-content">

    <div id="sec-dashboard" class="section active">
      <div class="metric-grid" id="metrics"></div>
      <div id="dashboard-alerts"></div>
      <div style="margin-bottom:1rem">
        <div class="flex-between mb-1">
          <h3 style="margin-bottom:0">유령 판정 대상자</h3>
          <button class="btn btn-sm" onclick="switchTab('ghost')">자세히 보기 →</button>
        </div>
        <div id="ghost-preview"></div>
      </div>
      <div>
        <div class="flex-between mb-1">
          <h3 style="margin-bottom:0">최근 벙 현황</h3>
          <button class="btn btn-sm" onclick="switchTab('bung')">전체 보기 →</button>
        </div>
        <div id="bung-preview"></div>
      </div>
    </div>

    <div id="sec-members" class="section">
      <div class="flex-between mb-2">
        <h3 style="margin-bottom:0">전체 회원</h3>
        <button class="btn btn-primary" onclick="openAddMember()"><i class="ti ti-plus"></i>회원 추가</button>
      </div>
      <div style="border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
        <table>
          <thead><tr><th>이름</th><th>가입일</th><th>최근 참여일</th><th style="text-align:center">운영진 연락</th><th>상태</th><th></th></tr></thead>
          <tbody id="member-tbody"></tbody>
        </table>
        <div id="member-empty" class="empty-state" style="display:none"><i class="ti ti-users"></i>등록된 회원이 없습니다.<br>회원 추가 버튼을 눌러 시작하세요.</div>
      </div>
    </div>

    <div id="sec-bung" class="section">
      <div class="flex-between mb-2">
        <h3 style="margin-bottom:0">벙 목록</h3>
        <button class="btn btn-primary" onclick="openAddBung()"><i class="ti ti-plus"></i>벙 추가</button>
      </div>
      <div id="bung-list"></div>
    </div>

    <div id="sec-ghost" class="section">
      <div id="ghost-alert-area"></div>
      <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem">
        <h3>유령 회원 기준</h3>
        <div style="font-size:13px;color:var(--text2);line-height:1.9">
          아래 <strong style="color:var(--text)">세 조건을 모두 충족</strong>하면 유령 회원입니다.<br>
          1. 기산일 기준 <strong style="color:var(--text)">2달 이전</strong> 가입자<br>
          2. 기산일 기준 <strong style="color:var(--text)">이전 두 달간</strong> 벙 참여 없음<br>
          3. 기산일 이전 <strong style="color:var(--text)">운영진에게 연락 없음</strong>
        </div>
      </div>
      <div>
        <div class="flex-between mb-2">
          <h3 style="margin-bottom:0">유령 판정 목록</h3>
          <div class="flex">
            <span class="text-sm text-secondary" id="ghost-calc-info"></span>
            <button class="btn btn-danger btn-sm" id="reset-btn" onclick="confirmReset()" style="display:none"><i class="ti ti-refresh"></i>초기화 실행</button>
          </div>
        </div>
        <div id="ghost-table-area"></div>
      </div>
    </div>

  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const CLIENT_ID = '267449211500-337dbu4hfi5pq6dk1si37jf6gp2nihgi.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const FILE_NAME = 'kiku_data.json';
const TODAY = new Date();

let tokenClient, gapiInited = false, gisInited = false;
let driveFileId = null;
let members = [], bungs = [], nextMemberId = 1, nextBungId = 1;

// ── Google API 초기화 ──────────────────────────────────────────────
function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
    gapiInited = true;
    maybeEnableButtons();
  });
}

function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { setStatus('로그인 실패: ' + resp.error, 'error'); return; }
      setDot('connected');
      document.getElementById('btn-login').style.display = 'none';
      document.getElementById('btn-logout').style.display = '';
      document.getElementById('btn-save').style.display = '';
      document.getElementById('btn-load').style.display = '';
      setStatus('Google Drive 연결됨 — 불러오기를 눌러 기존 데이터를 가져오세요');
      await findOrCreateFile();
    },
  });
  gisInited = true;
  maybeEnableButtons();
}

function maybeEnableButtons() {
  if (gapiInited && gisInited) {
    document.getElementById('btn-login').disabled = false;
  }
}

function driveLogin() {
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function driveLogout() {
  const token = gapi.client.getToken();
  if (token) google.accounts.oauth2.revoke(token.access_token);
  gapi.client.setToken('');
  driveFileId = null;
  setDot('disconnected');
  setStatus('Google Drive 연결 안 됨');
  document.getElementById('btn-login').style.display = '';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('btn-save').style.display = 'none';
  document.getElementById('btn-load').style.display = 'none';
}

async function findOrCreateFile() {
  setDot('loading');
  setStatus('드라이브에서 파일 확인 중...');
  try {
    const res = await gapi.client.drive.files.list({
      q: `name='${FILE_NAME}' and trashed=false`,
      spaces: 'drive',
      fields: 'files(id, name, modifiedTime)',
    });
    const files = res.result.files;
    if (files && files.length > 0) {
      driveFileId = files[0].id;
      const modified = new Date(files[0].modifiedTime);
      setDot('connected');
      setStatus(`드라이브 파일 발견 (마지막 저장: ${formatDate(modified)} ${modified.toTimeString().slice(0,5)}) — 불러오기를 눌러주세요`);
    } else {
      setDot('connected');
      setStatus('드라이브에 저장된 파일 없음 — 저장 버튼을 눌러 새로 생성하세요');
    }
  } catch(e) {
    setDot('disconnected');
    setStatus('파일 확인 실패: ' + e.message);
  }
}

async function driveSave() {
  if (!gapi.client.getToken()) { alert('먼저 Google 로그인을 해주세요.'); return; }
  setDot('loading');
  setStatus('드라이브에 저장 중...');
  const data = JSON.stringify({ members, bungs, nextMemberId, nextBungId, savedAt: new Date().toISOString(), version: '1.0' }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  try {
    if (driveFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + gapi.client.getToken().access_token, 'Content-Type': 'application/json' },
        body: blob,
      });
    } else {
      const meta = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + gapi.client.getToken().access_token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: FILE_NAME, mimeType: 'application/json' }),
      });
      const metaJson = await meta.json();
      driveFileId = metaJson.id;
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + gapi.client.getToken().access_token, 'Content-Type': 'application/json' },
        body: blob,
      });
    }
    setDot('connected');
    const now = new Date();
    setStatus(`드라이브 저장 완료 — ${formatDate(now)} ${now.toTimeString().slice(0,5)}`);
  } catch(e) {
    setDot('disconnected');
    setStatus('저장 실패: ' + e.message);
  }
}

async function driveLoad() {
  if (!driveFileId) { alert('드라이브에 저장된 파일이 없습니다. 먼저 저장해주세요.'); return; }
  setDot('loading');
  setStatus('드라이브에서 불러오는 중...');
  try {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, {
      headers: { Authorization: 'Bearer ' + gapi.client.getToken().access_token },
    });
    const data = await res.json();
    members = data.members || [];
    bungs = data.bungs || [];
    nextMemberId = data.nextMemberId || Math.max(0, ...members.map(m => m.id)) + 1;
    nextBungId = data.nextBungId || Math.max(0, ...bungs.map(b => b.id)) + 1;
    setDot('connected');
    setStatus(`불러오기 완료 — 회원 ${members.length}명, 벙 ${bungs.length}개`);
    renderAll();
    openModal(`<div class="modal-title" style="color:var(--success)"><i class="ti ti-check" style="font-size:18px;vertical-align:-3px;margin-right:4px"></i>불러오기 완료</div>
      <div style="font-size:13px;margin-bottom:16px;color:var(--text2)">회원 <strong style="color:var(--text)">${members.length}명</strong>, 벙 <strong style="color:var(--text)">${bungs.length}개</strong> 데이터를 불러왔습니다.</div>
      <div class="flex" style="justify-content:flex-end"><button class="btn btn-primary" onclick="closeModal()">확인</button></div>`);
  } catch(e) {
    setDot('disconnected');
    setStatus('불러오기 실패: ' + e.message);
  }
}

function exportLocal() {
  const data = { members, bungs, nextMemberId, nextBungId, exportedAt: new Date().toISOString(), version: '1.0' };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  a.href = url;
  a.download = `kiku_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── 유틸 ──────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('save-status').textContent = msg; }
function setDot(state) { document.getElementById('drive-dot').className = 'drive-dot ' + state; }

function getCalcDate() {
  const m = TODAY.getMonth()+1, y = TODAY.getFullYear();
  const ne = m%2===0 ? m : m+1;
  if (ne > 12) return new Date(y+1, 1, 1);
  return new Date(y, ne-1, 1);
}
function isCalcDay() {
  const cd = getCalcDate();
  return TODAY.getDate()===cd.getDate() && TODAY.getMonth()===cd.getMonth() && TODAY.getFullYear()===cd.getFullYear();
}
function formatDate(d) {
  if (!d) return '-';
  const dt = typeof d==='string' ? new Date(d) : d;
  if (isNaN(dt)) return '-';
  return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
}
function daysBetween(a, b) { return Math.floor((b-a)/(1000*60*60*24)); }

function getMemberStatus(m, calcDate) {
  const join = new Date(m.joinDate);
  const twoMonthsBefore = new Date(calcDate);
  twoMonthsBefore.setMonth(twoMonthsBefore.getMonth()-2);
  if (join > twoMonthsBefore) return 'new';
  const lastA = m.lastAttend ? new Date(m.lastAttend) : null;
  const twoMonthsAgo = new Date(calcDate);
  twoMonthsAgo.setMonth(twoMonthsAgo.getMonth()-2);
  if (lastA && lastA >= twoMonthsAgo) return 'safe';
  if (m.contacted) return 'contacted';
  return 'ghost';
}

// ── 렌더링 ────────────────────────────────────────────────────────
function renderMetrics() {
  const cd = getCalcDate();
  const c = { total: members.length, ghost: 0, warn: 0, safe: 0, new: 0 };
  members.forEach(m => {
    const s = getMemberStatus(m, cd);
    if (s==='ghost') c.ghost++;
    else if (s==='contacted') c.warn++;
    else if (s==='safe') c.safe++;
    else c.new++;
  });
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">전체 회원</div><div class="metric-value">${c.total}명</div></div>
    <div class="metric"><div class="metric-label">유령 대상</div><div class="metric-value danger">${c.ghost}명</div></div>
    <div class="metric"><div class="metric-label">연락 완료</div><div class="metric-value warning">${c.warn}명</div></div>
    <div class="metric"><div class="metric-label">정상 활동</div><div class="metric-value success">${c.safe}명</div></div>`;
}

function renderDashboardAlerts() {
  const cd = getCalcDate();
  let html = '';
  if (isCalcDay()) {
    html = `<div class="alert alert-danger"><i class="ti ti-alert-triangle"></i><div><strong>오늘이 유령 회원 정리일입니다!</strong> 유령 정리 탭에서 조치 후 초기화를 진행해주세요.</div></div>`;
  } else {
    const diff = daysBetween(TODAY, cd);
    if (diff <= 7) {
      html = `<div class="alert alert-warning"><i class="ti ti-clock"></i>다음 유령 정리일까지 <strong>${diff}일</strong> 남았습니다. (${formatDate(cd)})</div>`;
    } else {
      html = `<div class="alert alert-info"><i class="ti ti-info-circle"></i>다음 유령 정리일: <strong>${formatDate(cd)}</strong> (${diff}일 후)</div>`;
    }
  }
  document.getElementById('dashboard-alerts').innerHTML = html;
}

function renderGhostPreview() {
  const cd = getCalcDate();
  const ghosts = members.filter(m => getMemberStatus(m, cd)==='ghost');
  const el = document.getElementById('ghost-preview');
  if (ghosts.length === 0) { el.innerHTML = '<div style="font-size:13px;color:var(--text2);padding:8px 0">현재 유령 판정 대상자가 없습니다. ✓</div>'; return; }
  el.innerHTML = '<div style="border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden"><table><thead><tr><th>이름</th><th>가입일</th><th>마지막 참여</th></tr></thead><tbody>'
    + ghosts.map(m => `<tr><td><strong>${m.name}</strong></td><td>${formatDate(m.joinDate)}</td><td style="color:var(--danger)">${m.lastAttend?formatDate(m.lastAttend):'참여 없음'}</td></tr>`).join('')
    + '</tbody></table></div>';
}

function renderBungPreview() {
  const sorted = [...bungs].sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0,3);
  const el = document.getElementById('bung-preview');
  if (sorted.length === 0) { el.innerHTML = '<div style="font-size:13px;color:var(--text2);padding:8px 0">등록된 벙이 없습니다.</div>'; return; }
  el.innerHTML = '<div style="border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden"><table><thead><tr><th>날짜</th><th>이름</th><th>참석</th></tr></thead><tbody>'
    + sorted.map(b => {
        const isPast = new Date(b.date) <= TODAY;
        return `<tr><td>${formatDate(b.date)}</td><td>${b.name}</td><td>${isPast?`<strong>${b.attendees.length}명</strong>`:'<span style="color:var(--text2)">예정</span>'}</td></tr>`;
      }).join('')
    + '</tbody></table></div>';
}

function renderMembers() {
  const cd = getCalcDate();
  const tbody = document.getElementById('member-tbody');
  const empty = document.getElementById('member-empty');
  if (members.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  const badgeMap = { ghost:'<span class="badge badge-ghost">유령 대상</span>', contacted:'<span class="badge badge-contact">연락 완료</span>', safe:'<span class="badge badge-safe">정상</span>', new:'<span class="badge badge-new">신규</span>' };
  tbody.innerHTML = members.map(m => {
    const status = getMemberStatus(m, cd);
    const rc = status==='ghost' ? ' class="member-row-ghost"' : '';
    return `<tr${rc}><td><strong>${m.name}</strong></td><td>${formatDate(m.joinDate)}</td><td>${m.lastAttend?formatDate(m.lastAttend):'<span style="color:var(--text2)">없음</span>'}</td><td style="text-align:center"><input type="checkbox" class="contact-check" ${m.contacted?'checked':''} onchange="toggleContact(${m.id},this.checked)"></td><td>${badgeMap[status]}</td><td><div class="flex" style="gap:4px"><button class="btn btn-sm" onclick="openEditMember(${m.id})"><i class="ti ti-edit"></i></button><button class="btn btn-sm btn-danger" onclick="deleteMember(${m.id})"><i class="ti ti-trash"></i></button></div></td></tr>`;
  }).join('');
}

function renderBungs() {
  const el = document.getElementById('bung-list');
  const sorted = [...bungs].sort((a,b) => new Date(b.date)-new Date(a.date));
  if (sorted.length === 0) { el.innerHTML = '<div class="empty-state"><i class="ti ti-calendar-off"></i>등록된 벙이 없습니다.<br>벙 추가 버튼을 눌러 기록을 시작하세요.</div>'; return; }
  el.innerHTML = sorted.map(b => {
    const isPast = new Date(b.date) <= TODAY;
    const names = b.attendees.map(id => { const m = members.find(x => x.id===id); return m ? m.name : '?'; });
    return `<div class="bung-card"><div class="flex-between mb-1"><div class="flex"><strong>${b.name}</strong><span style="font-size:12px;color:var(--text2)">${formatDate(b.date)}</span>${isPast?'<span class="badge badge-safe">완료</span>':'<span class="badge badge-new">예정</span>'}</div><div class="flex" style="gap:4px"><button class="btn btn-sm" onclick="openEditBung(${b.id})"><i class="ti ti-edit"></i> 참석 입력</button><button class="btn btn-sm btn-danger" onclick="deleteBung(${b.id})"><i class="ti ti-trash"></i></button></div></div><div style="font-size:12px;color:var(--text2)">참석: ${names.length>0?names.join(', '):'없음'} (${names.length}명)</div></div>`;
  }).join('');
}

function renderGhost() {
  const cd = getCalcDate();
  const twoMonthsAgo = new Date(cd);
  twoMonthsAgo.setMonth(twoMonthsAgo.getMonth()-2);
  document.getElementById('ghost-calc-info').textContent = `기산일: ${formatDate(cd)} | 대상 기간: ${formatDate(twoMonthsAgo)} ~ ${formatDate(cd)}`;
  let alertHtml = '';
  if (isCalcDay()) {
    alertHtml = `<div class="alert alert-danger"><i class="ti ti-alert-triangle"></i><div><strong>오늘이 정리일입니다.</strong> 목록 확인 후 조치 완료 시 초기화를 실행하세요.</div></div>`;
    document.getElementById('reset-btn').style.display = '';
  } else {
    alertHtml = `<div class="alert alert-info"><i class="ti ti-clock"></i>다음 정리일까지 <strong>${daysBetween(TODAY, cd)}일</strong> 남았습니다. 현재는 미리보기 상태입니다.</div>`;
    document.getElementById('reset-btn').style.display = 'none';
  }
  document.getElementById('ghost-alert-area').innerHTML = alertHtml;
  const ghostList = members.filter(m => getMemberStatus(m, cd)==='ghost');
  const warnList = members.filter(m => getMemberStatus(m, cd)==='contacted');
  let html = '';
  if (ghostList.length===0 && warnList.length===0) {
    html = '<div style="font-size:13px;color:var(--text2);padding:1rem 0;text-align:center">유령 판정 대상자가 없습니다. ✓</div>';
  } else {
    if (ghostList.length > 0) {
      html += `<div class="section-label">퇴출 대상 (${ghostList.length}명)</div>`;
      html += '<div style="border:0.5px solid var(--danger-border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem"><table><thead><tr><th>이름</th><th>가입일</th><th>마지막 참여</th><th>조건1 가입</th><th>조건2 참여</th><th>조건3 연락</th></tr></thead><tbody>';
      ghostList.forEach(m => {
        const c1 = new Date(m.joinDate) <= twoMonthsAgo ? '<span style="color:var(--danger)">✗ 2달↑</span>' : '<span style="color:var(--success)">✓ 신규</span>';
        const la = m.lastAttend ? new Date(m.lastAttend) : null;
        const c2 = (!la || la < twoMonthsAgo) ? '<span style="color:var(--danger)">✗ 미참여</span>' : '<span style="color:var(--success)">✓ 참여</span>';
        const c3 = m.contacted ? '<span style="color:var(--success)">✓ 연락</span>' : '<span style="color:var(--danger)">✗ 미연락</span>';
        html += `<tr class="member-row-ghost"><td><strong>${m.name}</strong></td><td>${formatDate(m.joinDate)}</td><td>${m.lastAttend?formatDate(m.lastAttend):'없음'}</td><td>${c1}</td><td>${c2}</td><td>${c3}</td></tr>`;
      });
      html += '</tbody></table></div>';
    }
    if (warnList.length > 0) {
      html += `<div class="section-label">연락 완료 — 유예 대상 (${warnList.length}명)</div>`;
      html += '<div style="border:0.5px solid var(--warn-border);border-radius:var(--radius-lg);overflow:hidden"><table><thead><tr><th>이름</th><th>가입일</th><th>마지막 참여</th></tr></thead><tbody>';
      warnList.forEach(m => { html += `<tr><td><strong>${m.name}</strong></td><td>${formatDate(m.joinDate)}</td><td>${m.lastAttend?formatDate(m.lastAttend):'없음'}</td></tr>`; });
      html += '</tbody></table></div>';
    }
  }
  document.getElementById('ghost-table-area').innerHTML = html;
}

function renderAll() {
  document.getElementById('calc-date-display').textContent = `다음 유령 정리일: ${formatDate(getCalcDate())}`;
  renderMetrics(); renderDashboardAlerts(); renderGhostPreview(); renderBungPreview(); renderMembers(); renderBungs(); renderGhost();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['dashboard','members','bung','ghost'][i]===tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
}

function toggleContact(id, val) { const m = members.find(x => x.id===id); if (m) { m.contacted = val; renderAll(); } }

function deleteMember(id) {
  const m = members.find(x => x.id===id);
  if (!m || !confirm(`"${m.name}" 회원을 삭제할까요?`)) return;
  members = members.filter(x => x.id!==id);
  bungs.forEach(b => { b.attendees = b.attendees.filter(a => a!==id); });
  renderAll();
}

function deleteBung(id) {
  const b = bungs.find(x => x.id===id);
  if (!b || !confirm(`"${b.name}" 벙을 삭제할까요?`)) return;
  bungs = bungs.filter(x => x.id!==id);
  recalcLastAttend(); renderAll();
}

function recalcLastAttend() {
  members.forEach(m => {
    let last = null;
    bungs.forEach(b => { if (b.attendees.includes(m.id)) { const d = new Date(b.date); if (!last || d > last) last = d; } });
    m.lastAttend = last ? last.toISOString().slice(0,10) : null;
  });
}

function openModal(html) { document.getElementById('modal-content').innerHTML = html; document.getElementById('modal-backdrop').classList.add('open'); }
function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); }
function handleBackdropClick(e) { if (e.target === document.getElementById('modal-backdrop')) closeModal(); }

function openAddMember() {
  openModal(`<div class="modal-title"><i class="ti ti-user-plus" style="font-size:17px;vertical-align:-3px;margin-right:4px"></i>회원 추가</div>
    <div class="form-row"><div class="form-group"><label>이름</label><input type="text" id="m-name" placeholder="홍길동" autofocus></div><div class="form-group"><label>가입일</label><input type="date" id="m-join" value="${TODAY.toISOString().slice(0,10)}"></div></div>
    <div class="flex" style="justify-content:flex-end;gap:8px"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="addMember()">추가</button></div>`);
}
function addMember() {
  const name = document.getElementById('m-name').value.trim(), join = document.getElementById('m-join').value;
  if (!name || !join) { alert('이름과 가입일을 입력해주세요.'); return; }
  members.push({ id: nextMemberId++, name, joinDate: join, lastAttend: null, contacted: false });
  closeModal(); renderAll();
}

function openEditMember(id) {
  const m = members.find(x => x.id===id); if (!m) return;
  openModal(`<div class="modal-title"><i class="ti ti-edit" style="font-size:17px;vertical-align:-3px;margin-right:4px"></i>회원 수정 — ${m.name}</div>
    <div class="form-row"><div class="form-group"><label>이름</label><input type="text" id="e-name" value="${m.name}"></div><div class="form-group"><label>가입일</label><input type="date" id="e-join" value="${m.joinDate}"></div></div>
    <div class="form-group"><label>최근 참여일 (직접 수정)</label><input type="date" id="e-attend" value="${m.lastAttend||''}"></div>
    <div class="flex" style="justify-content:flex-end;gap:8px"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="editMember(${id})">저장</button></div>`);
}
function editMember(id) {
  const m = members.find(x => x.id===id); if (!m) return;
  m.name = document.getElementById('e-name').value.trim() || m.name;
  m.joinDate = document.getElementById('e-join').value || m.joinDate;
  const ea = document.getElementById('e-attend').value;
  m.lastAttend = ea || null;
  closeModal(); renderAll();
}

function openAddBung() {
  openModal(`<div class="modal-title"><i class="ti ti-calendar-plus" style="font-size:17px;vertical-align:-3px;margin-right:4px"></i>벙 추가</div>
    <div class="form-row"><div class="form-group"><label>벙 이름</label><input type="text" id="b-name" placeholder="6월 정모" autofocus></div><div class="form-group"><label>날짜</label><input type="date" id="b-date" value="${TODAY.toISOString().slice(0,10)}"></div></div>
    <div class="form-group"><label>참석자 선택</label><div class="attendee-scroll">${members.length===0?'<div style="color:var(--text2);font-size:13px;padding:8px 0">먼저 회원을 추가해주세요.</div>':members.map(m=>`<label class="attendee-label"><input type="checkbox" class="attend-check" value="${m.id}"> ${m.name}</label>`).join('')}</div></div>
    <div class="flex" style="justify-content:flex-end;gap:8px"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="addBung()">추가</button></div>`);
}
function addBung() {
  const name = document.getElementById('b-name').value.trim(), date = document.getElementById('b-date').value;
  if (!name || !date) { alert('벙 이름과 날짜를 입력해주세요.'); return; }
  const attendees = [...document.querySelectorAll('.attend-check:checked')].map(c => parseInt(c.value));
  bungs.push({ id: nextBungId++, date, name, attendees });
  attendees.forEach(id => { const m = members.find(x => x.id===id); if (m) { const d = new Date(date), cur = m.lastAttend ? new Date(m.lastAttend) : null; if (!cur || d > cur) m.lastAttend = date; } });
  closeModal(); renderAll();
}

function openEditBung(id) {
  const b = bungs.find(x => x.id===id); if (!b) return;
  openModal(`<div class="modal-title"><i class="ti ti-edit" style="font-size:17px;vertical-align:-3px;margin-right:4px"></i>참석 수정 — ${b.name}</div>
    <div class="form-row"><div class="form-group"><label>벙 이름</label><input type="text" id="eb-name" value="${b.name}"></div><div class="form-group"><label>날짜</label><input type="date" id="eb-date" value="${b.date}"></div></div>
    <div class="form-group"><label>참석자 선택</label><div class="attendee-scroll">${members.map(m=>`<label class="attendee-label"><input type="checkbox" class="attend-check" value="${m.id}" ${b.attendees.includes(m.id)?'checked':''}> ${m.name}</label>`).join('')}</div></div>
    <div class="flex" style="justify-content:flex-end;gap:8px"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="editBung(${id})">저장</button></div>`);
}
function editBung(id) {
  const b = bungs.find(x => x.id===id); if (!b) return;
  b.name = document.getElementById('eb-name').value.trim() || b.name;
  b.date = document.getElementById('eb-date').value || b.date;
  b.attendees = [...document.querySelectorAll('.attend-check:checked')].map(c => parseInt(c.value));
  recalcLastAttend(); closeModal(); renderAll();
}

function confirmReset() {
  openModal(`<div class="modal-title" style="color:var(--danger)"><i class="ti ti-alert-triangle" style="font-size:17px;vertical-align:-3px;margin-right:4px"></i>초기화 확인</div>
    <div class="alert alert-danger" style="margin-bottom:12px">모든 회원의 <strong>운영진 연락 여부</strong>를 초기화합니다.<br>퇴출 처리된 회원은 회원 명단에서 직접 삭제해주세요.</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:16px">초기화 후 드라이브 저장을 꼭 해주세요.</div>
    <div class="flex" style="justify-content:flex-end;gap:8px"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-danger" onclick="doReset()">초기화 실행</button></div>`);
}
function doReset() { members.forEach(m => m.contacted = false); closeModal(); renderAll(); }

renderAll();
</script>

<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
