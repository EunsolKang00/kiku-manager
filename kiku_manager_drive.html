<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIKU 회원 관리</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9a9a9a;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:8px;--radius-lg:12px;
  --danger-bg:#FCEBEB;--danger:#A32D2D;--danger-border:#F09595;
  --warn-bg:#FAEEDA;--warn:#854F0B;--warn-border:#EF9F27;
  --info-bg:#E6F1FB;--info:#185FA5;--info-border:#85B7EB;
  --success-bg:#EAF3DE;--success:#3B6D11;--success-border:#97C459;
  --purple-bg:#EEEDFE;--purple:#534AB7;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2a2a28;
    --text:#f0efe9;--text2:#9a9a90;--text3:#6b6b65;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
    --danger-bg:#3a1a1a;--danger:#F09595;--danger-border:#791F1F;
    --warn-bg:#3a2e10;--warn:#FAC775;--warn-border:#633806;
    --info-bg:#0e1e36;--info:#85B7EB;--info-border:#0C447C;
    --success-bg:#162310;--success:#97C459;--success-border:#27500A;
    --purple-bg:#1e1c3a;--purple:#AFA9EC;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
.app{max-width:860px;margin:0 auto;padding:1.5rem 1rem}
.header{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.save-bar{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:10px 16px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.save-status{font-size:12px;color:var(--text2)}
.tabs{display:flex;gap:0;margin-bottom:0;border-bottom:0.5px solid var(--border);background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:0 1rem;overflow-x:auto}
.tab{padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--text);font-weight:500;border-bottom:2px solid var(--text)}
.tab:hover:not(.active){color:var(--text)}
.tab i{margin-right:4px;font-size:15px;vertical-align:-2px}
.tab-content{background:var(--bg);border:0.5px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.section{display:none}.section.active{display:block}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1rem}
.metric{background:var(--bg2);border-radius:var(--radius);padding:1rem;text-align:center}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500}
.metric-value.danger{color:var(--danger)}
.metric-value.warning{color:var(--warn)}
.metric-value.success{color:var(--success)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--radius);font-weight:500}
.badge-ghost{background:var(--danger-bg);color:var(--danger)}
.badge-safe{background:var(--success-bg);color:var(--success)}
.badge-new{background:var(--info-bg);color:var(--info)}
.badge-contact{background:var(--purple-bg);color:var(--purple)}
.badge-jeongmo{background:var(--info-bg);color:var(--info)}
.badge-bungae{background:var(--warn-bg);color:var(--warn)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);font-size:12px}
td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.btn{padding:6px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:none;cursor:pointer;font-size:13px;color:var(--text);transition:background 0.1s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{opacity:0.85}
.btn-danger{color:var(--danger);border-color:var(--danger-border)}
.btn-danger:hover{background:var(--danger-bg)}
.btn-success{color:var(--success);border-color:var(--success-border)}
.btn-success:hover{background:var(--success-bg)}
.btn-warn{color:var(--warn);border-color:var(--warn-border)}
.btn-warn:hover{background:var(--warn-bg)}
.btn-info{color:var(--info);border-color:var(--info-border)}
.btn-info:hover{background:var(--info-bg)}
.btn-sm{padding:3px 10px;font-size:12px}
.btn i{font-size:14px;vertical-align:-2px;margin-right:3px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-group label{font-size:12px;color:var(--text2);font-weight:500}
input[type=text],input[type=date],select,textarea{width:100%;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
textarea{resize:vertical;min-height:60px;line-height:1.5}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--text);box-shadow:0 0 0 2px rgba(0,0,0,0.06)}
.alert{padding:11px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.alert i{font-size:16px;flex-shrink:0;margin-top:1px}
.alert-danger{background:var(--danger-bg);color:var(--danger);border:0.5px solid var(--danger-border)}
.alert-warning{background:var(--warn-bg);color:var(--warn);border:0.5px solid var(--warn-border)}
.alert-info{background:var(--info-bg);color:var(--info);border:0.5px solid var(--info-border)}
.alert-success{background:var(--success-bg);color:var(--success);border:0.5px solid var(--success-border)}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.mb-1{margin-bottom:8px}.mb-2{margin-bottom:16px}
.text-secondary{color:var(--text2)}
.text-sm{font-size:12px}
.divider{border:none;border-top:0.5px solid var(--border);margin:1rem 0}
.member-row-ghost td{background:var(--danger-bg) !important}
.contact-check{width:14px;height:14px;cursor:pointer;accent-color:var(--purple)}
.modal-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:500;margin-bottom:1rem}
h3{font-size:15px;font-weight:500;margin-bottom:10px}
.section-label{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
.empty-state{padding:2rem;text-align:center;color:var(--text2);font-size:13px}
.empty-state i{font-size:32px;display:block;margin-bottom:8px;opacity:0.4}
.bung-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:10px}
.bung-card-meta{font-size:12px;color:var(--text2);display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.bung-card-meta span{display:flex;align-items:center;gap:4px}
.attendee-scroll{max-height:160px;overflow-y:auto;border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px}
.attendee-label{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;font-size:13px}
.attendee-tag{display:inline-flex;align-items:center;background:var(--purple-bg);color:var(--purple);font-size:12px;padding:3px 10px;border-radius:var(--radius);font-weight:500}
.drive-status{display:flex;align-items:center;gap:6px;font-size:12px}
.drive-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.drive-dot.connected{background:var(--success)}
.drive-dot.disconnected{background:var(--text3)}
.drive-dot.loading{background:var(--warn);animation:pulse 1s infinite}
.memo-text{font-size:12px;color:var(--text2);font-style:italic;margin-top:2px}
.template-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-all;margin-bottom:8px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@media(max-width:480px){.form-row,.form-row-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="flex-between">
      <div>
        <div style="font-size:18px;font-weight:500">🎤 KIKU 회원 관리</div>
        <div class="text-sm text-secondary" id="calc-date-display" style="margin-top:2px"></div>
      </div>
    </div>
  </div>

  <div class="save-bar">
    <div class="drive-status">
      <div class="drive-dot disconnected" id="drive-dot"></div>
      <span class="save-status" id="save-status">Google Drive 연결 안 됨</span>
    </div>
    <div class="flex" style="gap:6px;flex-wrap:wrap">
      <button class="btn btn-sm" id="btn-login" onclick="driveLogin()"><i class="ti ti-brand-google"></i> Google 로그인</button>
      <button class="btn btn-sm" id="btn-logout" onclick="driveLogout()" style="display:none"><i class="ti ti-logout"></i> 로그아웃</button>
      <button class="btn btn-sm btn-success" id="btn-save" onclick="driveSave()" style="display:none"><i class="ti ti-cloud-upload"></i> 드라이브에 저장</button>
      <button class="btn btn-sm" id="btn-load" onclick="driveLoad()" style="display:none"><i class="ti ti-cloud-download"></i> 드라이브에서 불러오기</button>
      <button class="btn btn-sm btn-warn" onclick="exportLocal()"><i class="ti ti-download"></i> 로컬 백업</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard')"><i class="ti ti-layout-dashboard"></i>대시보드</button>
    <button class="tab" onclick="switchTab('members')"><i class="ti ti-users"></i>회원 명단</button>
    <button class="tab" onclick="switchTab('bung')"><i class="ti ti-calendar-event"></i>벙 관리</button>
    <button class="tab" onclick="switchTab('ghost')"><i class="ti ti-ghost"></i>유령 정리</button>
    <button class="tab" onclick="switchTab('stats')"><i class="ti ti-chart-bar"></i>통계</button>
    <button class="tab" onclick="switchTab('report')"><i class="ti ti-report"></i>리포트</button>
  </div>

  <div class="tab-content">

    <!-- 대시보드 -->
    <div id="sec-dashboard" class="section active">
      <div class="metric-grid" id="metrics"></div>
      <div id="dashboard-alerts"></div>
      <div style="margin-bottom:1rem">
        <div class="flex-between mb-1">
          <h3 style="margin-bottom:0">유령 판정 대상자</h3>
          <button class="btn btn-sm" onclick="switchTab('ghost')">자세히 보기 →</button>
        </div>
        <div id="ghost-preview"></div>
      </div>
      <div>
        <div class="flex-between mb-1">
          <h3 style="margin-bottom:0">최근 벙 현황</h3>
          <button class="btn btn-sm" onclick="switchTab('bung')">전체 보기 →</button>
        </div>
        <div id="bung-preview"></div>
      </div>
    </div>

    <!-- 회원 명단 -->
    <div id="sec-members" class="section">
      <div class="flex-between mb-2">
        <h3 style="margin-bottom:0">전체 회원</h3>
        <button class="btn btn-primary" onclick="openAddMember()"><i class="ti ti-plus"></i>회원 추가</button>
      </div>
      <div style="border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
        <table>
          <thead><tr><th>이름</th><th>가입일</th><th>최근 참여일</th><th style="text-align:center">운영진 연락</th><th>상태</th><th>등급</th><th>메모</th><th></th></tr></thead>
          <tbody id="member-tbody"></tbody>
        </table>
        <div id="member-empty" class="empty-state" style="display:none"><i class="ti ti-users"></i>등록된 회원이 없습니다.<br>회원 추가 버튼을 눌러 시작하세요.</div>
      </div>
    </div>

    <!-- 벙 관리 -->
    <div id="sec-bung" class="section">
      <div class="flex-between mb-2">
        <h3 style="margin-bottom:0">벙 목록</h3>
        <button class="btn btn-primary" onclick="openAddBung()"><i class="ti ti-plus"></i>벙 추가</button>
      </div>
      <div id="bung-list"></div>
    </div>

    <!-- 유령 정리 -->
    <div id="sec-ghost" class="section">
      <div id="ghost-alert-area"></div>
      <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem">
        <h3>유령 회원 기준</h3>
        <div style="font-size:13px;color:var(--text2);line-height:1.9">
          아래 <strong style="color:var(--text)">세 조건을 모두 충족</strong>하면 유령 회원입니다.<br>
          1. 기산일 기준 <strong style="color:var(--text)">2달 이전</strong> 가입자<br>
          2. 기산일 기준 <strong style="color:var(--text)">이전 두 달간</strong> 벙 참여 없음<br>
          3. 기산일 이전 <strong style="color:var(--text)">운영진에게 연락 없음</strong>
        </div>
      </div>
      <div>
        <div class="flex-between mb-2">
          <h3 style="margin-bottom:0">유령 판정 목록</h3>
          <div class="flex">
            <span class="text-sm text-secondary" id="ghost-calc-info"></span>
            <button class="btn btn-info btn-sm" onclick="openGhostMessage()"><i class="ti ti-message"></i>퇴출 메시지 생성</button>
            <button class="btn btn-danger btn-sm" id="reset-btn" onclick="confirmReset()" style="display:none"><i class="ti ti-refresh"></i>초기화 실행</button>
          </div>
        </div>
        <div id="ghost-table-area"></div>
      </div>
    </div>

    <!-- 리포트 -->
    <div id="sec-report" class="section">
      <div id="report-content"></div>
    </div>

    <!-- 통계 -->
    <div id="sec-stats" class="section">
      <div id="stats-content"></div>
    </div>

  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const CLIENT_ID = '267449211500-337dbu4hfi5pq6dk1si37jf6gp2nihgi.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.email';
const SHARED_FILE_ID = '1nWwlKMjRhrsL-x1D22GZRBu0IHQsQvoG';
const API_KEY = 'AIzaSyAMSqS7h9x1scpyMHEzTaU4cvbAbvq5Qfo';
const OWNER_EMAIL = 'qeqe147258@gmail.com';
const TODAY = new Date();

let tokenClient, gapiInited=false, gisInited=false, driveFileId=null;
let members=[], bungs=[], nextMemberId=1, nextBungId=1;

// ── Google API ─────────────────────────────────────────────────────
function gapiLoaded(){
  gapi.load('client',async()=>{
    await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    gapiInited=true; maybeEnableButtons();
  });
}
function gisLoaded(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES,
    callback:async(resp)=>{
      if(resp.error){
        if(resp.error==='interaction_required'||resp.error==='access_denied') return;
        setStatus('로그인 실패: '+resp.error); return;
      }
      setDot('connected');
      document.getElementById('btn-login').style.display='none';
      document.getElementById('btn-logout').style.display='';
      document.getElementById('btn-load').style.display='';
      setDot('loading'); setStatus('데이터 불러오는 중...');
      await findOrCreateFile();
      await checkOwnerAndSetUI();
      await driveAutoLoad();
    },
  });
  gisInited=true; maybeEnableButtons();
}
function maybeEnableButtons(){
  if(gapiInited&&gisInited){ document.getElementById('btn-login').disabled=false; trySilentLogin(); }
}
function trySilentLogin(){ tokenClient.requestAccessToken({prompt:''}); }
function driveLogin(){ tokenClient.requestAccessToken({prompt:'select_account'}); }
function driveLogout(){
  const token=gapi.client.getToken();
  if(token) google.accounts.oauth2.revoke(token.access_token);
  gapi.client.setToken(''); driveFileId=null;
  setDot('disconnected'); setStatus('Google Drive 연결 안 됨');
  document.getElementById('btn-login').style.display='';
  document.getElementById('btn-logout').style.display='none';
  document.getElementById('btn-save').style.display='none';
  document.getElementById('btn-load').style.display='none';
}
async function checkOwnerAndSetUI(){
  try{
    const res=await fetch('https://www.googleapis.com/oauth2/v2/userinfo',{headers:{Authorization:'Bearer '+gapi.client.getToken().access_token}});
    const info=await res.json();
    const isOwner=info.email===OWNER_EMAIL;
    document.getElementById('btn-save').style.display=isOwner?'':'none';
    document.getElementById('btn-load').style.display='';
  }catch(e){ document.getElementById('btn-save').style.display='none'; }
}
async function findOrCreateFile(){ driveFileId=SHARED_FILE_ID; setDot('connected'); }

async function driveSave(){
  if(!gapi.client.getToken()){alert('먼저 Google 로그인을 해주세요.');return;}
  setDot('loading'); setStatus('드라이브에 저장 중...');
  const data=JSON.stringify({members,bungs,nextMemberId,nextBungId,savedAt:new Date().toISOString(),version:'1.1'},null,2);
  try{
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${SHARED_FILE_ID}?uploadType=media`,{
      method:'PATCH',
      headers:{Authorization:'Bearer '+gapi.client.getToken().access_token,'Content-Type':'application/json'},
      body:data,
    });
    setDot('connected');
    const now=new Date();
    setStatus(`드라이브 저장 완료 — ${formatDate(now)} ${now.toTimeString().slice(0,5)}`);
  }catch(e){ setDot('disconnected'); setStatus('저장 실패: '+e.message); }
}

async function driveAutoLoad(){
  try{
    const token=gapi.client.getToken();
    const url=token?`https://www.googleapis.com/drive/v3/files/${SHARED_FILE_ID}?alt=media`:`https://www.googleapis.com/drive/v3/files/${SHARED_FILE_ID}?alt=media&key=${API_KEY}`;
    const headers=token?{Authorization:'Bearer '+token.access_token}:{};
    const res=await fetch(url,{headers});
    const data=await res.json();
    members=data.members||[]; bungs=data.bungs||[];
    nextMemberId=data.nextMemberId||Math.max(0,...members.map(m=>m.id))+1;
    nextBungId=data.nextBungId||Math.max(0,...bungs.map(b=>b.id))+1;
    setDot('connected');
    const now=new Date(data.savedAt);
    setStatus(`자동 불러오기 완료 — 회원 ${members.length}명, 벙 ${bungs.length}개 (저장: ${formatDate(now)} ${isNaN(now)?'':now.toTimeString().slice(0,5)})`);
    renderAll();
  }catch(e){ setDot('connected'); setStatus('드라이브 연결됨 — 불러오기 실패, 수동으로 눌러주세요'); }
}

async function driveLoad(){
  setDot('loading'); setStatus('드라이브에서 불러오는 중...');
  try{
    const token=gapi.client.getToken();
    const url=token?`https://www.googleapis.com/drive/v3/files/${SHARED_FILE_ID}?alt=media`:`https://www.googleapis.com/drive/v3/files/${SHARED_FILE_ID}?alt=media&key=${API_KEY}`;
    const headers=token?{Authorization:'Bearer '+token.access_token}:{};
    const res=await fetch(url,{headers});
    const data=await res.json();
    members=data.members||[]; bungs=data.bungs||[];
    nextMemberId=data.nextMemberId||Math.max(0,...members.map(m=>m.id))+1;
    nextBungId=data.nextBungId||Math.max(0,...bungs.map(b=>b.id))+1;
    setDot('connected'); setStatus(`불러오기 완료 — 회원 ${members.length}명, 벙 ${bungs.length}개`);
    renderAll();
    openModal(`<div class="modal-title" style="color:var(--success)"><i class="ti ti-check" style="font-size:18px;vertical-align:-3px;margin-right:4px"></i>불러오기 완료</div>
      <div style="font-size:13px;margin-bottom:16px;color:var(--text2)">회원 <strong style="color:var(--text)">${members.length}명</strong>, 벙 <strong style="color:var(--text)">${bungs.length}개</strong> 데이터를 불러왔습니다.</div>
      <div class="flex" style="justify-content:flex-end"><button class="btn btn-primary" onclick="closeModal()">확인</button></div>`);
  }catch(e){ setDot('disconnected'); setStatus('불러오기 실패: '+e.message); }
}

function exportLocal(){
  const data={members,bungs,nextMemberId,nextBungId,exportedAt:new Date().toISOString(),version:'1.1'};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url; a.download=`kiku_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click(); URL.revokeObjectURL(url);
}

// ── 유틸 ──────────────────────────────────────────────────────────
function setStatus(msg){document.getElementById('save-status').textContent=msg;}
function setDot(state){document.getElementById('drive-dot').className='drive-dot '+state;}
function getCalcDate(){
  const m=TODAY.getMonth()+1,y=TODAY.getFullYear();
  if(m%2===0&&TODAY.getDate()===1)return new Date(y,m-1,1);
  const ne=m%2===0?m+2:m+1;
  if(ne>12)return new Date(y+1,1,1);
  return new Date(y,ne-1,1);
}
function isCalcDay(){
  const cd=getCalcDate();
  return TODAY.getDate()===cd.getDate()&&TODAY.getMonth()===cd.getMonth()&&TODAY.getFullYear()===cd.getFullYear();
}
function formatDate(d){
  if(!d)return '-';
  const dt=typeof d==='string'?new Date(d):d;
  if(isNaN(dt))return '-';
  return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
}
function daysBetween(a,b){return Math.floor((b-a)/(1000*60*60*24));}
function getMemberStatus(m,calcDate){
  const join=new Date(m.joinDate);
  const twoMonthsBefore=new Date(calcDate);
  twoMonthsBefore.setMonth(twoMonthsBefore.getMonth()-2);
  if(join>twoMonthsBefore)return 'new';
  const lastA=m.lastAttend?new Date(m.lastAttend):null;
  const twoMonthsAgo=new Date(calcDate);
  twoMonthsAgo.setMonth(twoMonthsAgo.getMonth()-2);
  if(lastA&&lastA>=twoMonthsAgo)return 'safe';
  if(m.contacted)return 'contacted';
  return 'ghost';
}

// ── 렌더링 ────────────────────────────────────────────────────────
function renderMetrics(){
  const cd=getCalcDate();
  const c={total:members.length,ghost:0,warn:0,safe:0,new:0};
  members.forEach(m=>{
    const s=getMemberStatus(m,cd);
    if(s==='ghost')c.ghost++;
    else if(s==='contacted')c.warn++;
    else if(s==='safe')c.safe++;
    else c.new++;
  });
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">전체 회원</div><div class="metric-value">${c.total}명</div></div>
    <div class="metric"><div class="metric-label">유령 대상</div><div class="metric-value danger">${c.ghost}명</div></div>
    <div class="metric"><div class="metric-label">연락 완료</div><div class="metric-value warning">${c.warn}명</div></div>
    <div class="metric"><div class="metric-label">정상 활동</div><div class="metric-value success">${c.safe}명</div></div>
    <div class="metric"><div class="metric-label">총 벙 횟수</div><div class="metric-value">${bungs.length}회</div></div>`;
}

function renderReport(){
  const el=document.getElementById('report-content');
  if(!el)return;
  if(bungs.length===0){
    el.innerHTML='<div class="empty-state"><i class="ti ti-report"></i>벙 데이터가 있어야 리포트를 볼 수 있어요.</div>';
    return;
  }

  // 월별 벙 집계
  const monthMap={};
  bungs.forEach(b=>{
    const d=new Date(b.date);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!monthMap[key])monthMap[key]={count:0,attendTotal:0,jeongmo:0,bungae:0};
    monthMap[key].count++;
    monthMap[key].attendTotal+=b.attendees.length;
    if(b.type==='번개')monthMap[key].bungae++;
    else monthMap[key].jeongmo++;
  });
  const months=Object.keys(monthMap).sort();
  const maxCount=Math.max(...months.map(k=>monthMap[k].count),1);

  // 분기별 집계
  const quarterMap={};
  bungs.forEach(b=>{
    const d=new Date(b.date);
    const q=Math.ceil((d.getMonth()+1)/3);
    const key=`${d.getFullYear()} Q${q}`;
    if(!quarterMap[key])quarterMap[key]={count:0,attendTotal:0};
    quarterMap[key].count++;
    quarterMap[key].attendTotal+=b.attendees.length;
  });
  const quarters=Object.keys(quarterMap).sort();

  let html=`
  <div style="margin-bottom:1.5rem">
    <h3>📊 월별 벙 현황</h3>
    <div style="border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px">
      <table>
        <thead><tr><th>월</th><th>벙 횟수</th><th>정모</th><th>번개</th><th>평균 참석</th><th>그래프</th></tr></thead>
        <tbody>
        ${months.map(k=>{
          const m=monthMap[k];
          const avg=m.count>0?Math.round(m.attendTotal/m.count):0;
          const [y,mo]=k.split('-');
          return `<tr>
            <td><strong>${y}년 ${parseInt(mo)}월</strong></td>
            <td>${m.count}회</td>
            <td><span class="badge badge-jeongmo">${m.jeongmo}</span></td>
            <td><span class="badge badge-bungae">${m.bungae}</span></td>
            <td>${avg}명</td>
            <td style="min-width:100px"><div style="background:var(--bg3);border-radius:4px;height:8px;overflow:hidden"><div style="width:${Math.round(m.count/maxCount*100)}%;background:var(--info);height:100%;border-radius:4px"></div></div></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <div style="margin-bottom:1.5rem">
    <h3>📋 분기별 리포트</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px">
    ${quarters.map(k=>{
      const q=quarterMap[k];
      const avg=q.count>0?Math.round(q.attendTotal/q.count):0;
      return `<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem">
        <div style="font-weight:500;margin-bottom:8px">${k}</div>
        <div style="font-size:13px;color:var(--text2);line-height:2">
          벙 횟수: <strong style="color:var(--text)">${q.count}회</strong><br>
          평균 참석: <strong style="color:var(--text)">${avg}명</strong>
        </div>
      </div>`;
    }).join('')}
    </div>
  </div>`;

  el.innerHTML=html;
}

function getMemberGrade(rate){
  if(rate>=60)return{label:'⭐ 우수',color:'var(--success)',bg:'var(--success-bg)'};
  if(rate>=20)return{label:'✅ 활동',color:'var(--info)',bg:'var(--info-bg)'};
  return{label:'👤 일반',color:'var(--text2)',bg:'var(--bg2)'};
}

function getMemberStats(){
  const totalBungs=bungs.length;
  return members.map(m=>{
    const attended=bungs.filter(b=>b.attendees.includes(m.id)).length;
    const rate=totalBungs>0?Math.round(attended/totalBungs*100):0;
    const grade=getMemberGrade(rate);
    return{...m,attended,rate,grade};
  }).sort((a,b)=>b.rate-a.rate||b.attended-a.attended);
}

function renderStats(){
  const el=document.getElementById('stats-content');
  if(!el)return;
  const totalBungs=bungs.length;
  const stats=getMemberStats();
  if(totalBungs===0||members.length===0){
    el.innerHTML='<div class="empty-state"><i class="ti ti-chart-bar"></i>벙과 회원 데이터가 있어야 통계를 볼 수 있어요.</div>';
    return;
  }
  const top3=stats.slice(0,3);
  const gradeCount={우수:stats.filter(s=>s.rate>=80).length,활동:stats.filter(s=>s.rate>=40&&s.rate<80).length,일반:stats.filter(s=>s.rate<40).length};

  let html=`
  <div class="metric-grid" style="margin-bottom:1.5rem">
    <div class="metric"><div class="metric-label">총 벙 횟수</div><div class="metric-value">${totalBungs}회</div></div>
    <div class="metric"><div class="metric-label">⭐ 우수 회원</div><div class="metric-value success">${gradeCount.우수}명</div></div>
    <div class="metric"><div class="metric-label">✅ 활동 회원</div><div class="metric-value" style="color:var(--info)">${gradeCount.활동}명</div></div>
    <div class="metric"><div class="metric-label">👤 일반 회원</div><div class="metric-value" style="color:var(--text2)">${gradeCount.일반}명</div></div>
  </div>

  <div style="margin-bottom:1.5rem">
    <h3>🏆 참여율 랭킹</h3>
    <div style="display:flex;flex-direction:column;gap:8px">
    ${top3.map((s,i)=>{
      const medals=['🥇','🥈','🥉'];
      return `<div style="display:flex;align-items:center;gap:12px;background:var(--bg2);border-radius:var(--radius-lg);padding:10px 16px">
        <span style="font-size:20px">${medals[i]}</span>
        <div style="flex:1">
          <div style="font-weight:500">${s.name} <span style="font-size:11px;padding:2px 8px;border-radius:var(--radius);background:${s.grade.bg};color:${s.grade.color};font-weight:500">${s.grade.label}</span></div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${s.attended}회 참석 / 전체 ${totalBungs}회</div>
        </div>
        <div style="font-size:20px;font-weight:500;color:${s.grade.color}">${s.rate}%</div>
      </div>`;
    }).join('')}
    </div>
  </div>

  <div>
    <h3>전체 회원 참여율</h3>
    <div style="border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
      <table>
        <thead><tr><th>순위</th><th>이름</th><th>등급</th><th>참석 횟수</th><th>참여율</th><th>그래프</th></tr></thead>
        <tbody>
        ${stats.map((s,i)=>`<tr>
          <td style="color:var(--text2)">${i+1}</td>
          <td><strong>${s.name}</strong></td>
          <td><span style="font-size:11px;padding:2px 8px;border-radius:var(--radius);background:${s.grade.bg};color:${s.grade.color};font-weight:500">${s.grade.label}</span></td>
          <td>${s.attended}회</td>
          <td style="font-weight:500;color:${s.grade.color}">${s.rate}%</td>
          <td style="min-width:80px"><div style="background:var(--bg3);border-radius:4px;height:8px;overflow:hidden"><div style="width:${s.rate}%;background:${s.grade.color};height:100%;border-radius:4px;transition:width 0.3s"></div></div></td>
        </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-top:8px">등급 기준: ⭐ 우수 60% 이상 | ✅ 활동 20~59% | 👤 일반 20% 미만</div>
  </div>`;
  el.innerHTML=html;
}

function renderAll(){
  document.getElementById('calc-date-display').textContent=`다음 유령 정리일: ${formatDate(getCalcDate())}`;
  renderMetrics();renderDashboardAlerts();renderGhostPreview();renderBungPreview();renderMembers();renderBungs();renderGhost();renderStats();renderReport();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['dashboard','members','bung','ghost','stats','report'][i]===tab));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
}

function toggleContact(id,val){const m=members.find(x=>x.id===id);if(m){m.contacted=val;renderAll();}}

function deleteMember(id){
  const m=members.find(x=>x.id===id);
  if(!m||!confirm(`"${m.name}" 회원을 삭제할까요?`))return;
  members=members.filter(x=>x.id!==id);
  bungs.forEach(b=>{b.attendees=b.attendees.filter(a=>a!==id);if(b.hostId===id)b.hostId=null;});
  renderAll();
}
function deleteBung(id){
  const b=bungs.find(x=>x.id===id);
  if(!b||!confirm(`"${b.name}" 벙을 삭제할까요?`))return;
  bungs=bungs.filter(x=>x.id!==id);
  recalcLastAttend();renderAll();
}
function recalcLastAttend(){
  members.forEach(m=>{
    let last=null;
    bungs.forEach(b=>{if(b.attendees.includes(m.id)){const d=new Date(b.date);if(!last||d>last)last=d;}});
    m.lastAttend=last?last.toISOString().slice(0,10):null;
  });
}

function closeModal(){document.getElementById('modal-backdrop').classList.remove('open');}

function memberSelectHTML(mode, checkedIds=[]){
  return `<div style="display:flex;gap:6px;margin-bottom:6px">
    <input type="text" id="member-search${mode==='edit'?'-edit':''}" placeholder="이름 입력 후 엔터 또는 쉼표로 구분" style="flex:1" onkeydown="handleAttendeeInput(event,'${mode}')">
    <button class="btn btn-sm" onclick="handleAttendeeAdd('${mode}')" type="button">추가</button>
  </div>
  <div id="${mode}-tag-area" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:28px">${checkedIds.map(id=>{const m=members.find(x=>x.id===id);return m?`<span class="attendee-tag" data-id="${m.id}">${m.name} <span onclick="removeAttendeeTag(this,'${mode}')" style="cursor:pointer;margin-left:2px">×</span></span>`:''}).join('')}</div>

function openAddBung(){
  openModal(`<div class="modal-title"><i class="ti ti-calendar-plus" style="font-size:17px;vertical-align:-3px;margin-right:4px"></i>벙 추가</div>
    <div class="form-row"><div class="form-group"><label>벙 이름</label><input type="text" id="b-name" placeholder="6월 정모" autofocus></div><div class="form-group"><label>날짜</label><input type="date" id="b-date" value="${TODAY.toISOString().slice(0,10)}"></div></div>
    <div class="form-row"><div class="form-group"><label>구분</label><select id="b-type"><option value="정모">정모</option><option value="번개">번개</option></select></div><div class="form-group"><label>장소</label><input type="text" id="b-place" placeholder="홍대 코인노래방"></div></div>
    <div class="form-row"><div class="form-group"><label>벙주</label><select id="b-host"><option value="">선택 안 함</option>${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div><div class="form-group"><label>시간</label><input type="text" id="b-time" placeholder="오후 7시 30분"></div></div>

}
function addBung(){
  const name=document.getElementById('b-name').value.trim(),date=document.getElementById('b-date').value;
  if(!name||!date){alert('벙 이름과 날짜를 입력해주세요.');return;}
  const attendees=[...document.querySelectorAll('#add-attendee-list .attend-check:checked')].map(c=>parseInt(c.value));
  const hostVal=document.getElementById('b-host').value;
  const bung={id:nextBungId++,date,name,attendees,
    type:document.getElementById('b-type').value,
    place:document.getElementById('b-place').value.trim(),
    hostId:hostVal?parseInt(hostVal):null,
    time:document.getElementById('b-time').value.trim(),
    topic:document.getElementById('b-topic').value.trim(),
    memo:document.getElementById('b-memo').value.trim()};
  bungs.push(bung);
  attendees.forEach(id=>{const m=members.find(x=>x.id===id);if(m){const d=new Date(date),cur=m.lastAttend?new Date(m.lastAttend):null;if(!cur||d>cur)m.lastAttend=date;}});
  closeModal();renderAll();
}

    <div class="form-row"><div class="form-group"><label>구분</label><select id="eb-type"><option value="정모" ${b.type==='정모'?'selected':''}>정모</option><option value="번개" ${b.type==='번개'?'selected':''}>번개</option></select></div><div class="form-group"><label>장소</label><input type="text" id="eb-place" value="${b.place||''}"></div></div>
    <div class="form-row"><div class="form-group"><label>벙주</label><select id="eb-host"><option value="">선택 안 함</option>${members.map(m=>`<option value="${m.id}" ${b.hostId===m.id?'selected':''}>${m.name}</option>`).join('')}</select></div><div class="form-group"><label>시간</label><input type="text" id="eb-time" value="${b.time||''}"></div></div>

  b.date=document.getElementById('eb-date').value||b.date;

  b.hostId=hv?parseInt(hv):null;

function openTemplate(id){
  const b=bungs.find(x=>x.id===id);if(!b)return;
  const host=b.hostId?members.find(x=>x.id===b.hostId):null;
  const d=new Date(b.date);
  const weekdays=['일','월','화','수','목','금','토'];
  const dateStr=`${d.getMonth()+1}월 ${d.getDate()}일(${weekdays[d.getDay()]})`;
  const template=`일시 : ${dateStr}
장소 : ${b.place||'미정'}
시간 : ${b.time||'미정'}
인원 : ${b.attendees.length}명
주제 : ${b.topic||'노래방'}${b.memo?`\n\n${b.memo}`:''}`;

  openModal(`<div class="modal-title"><i class="ti ti-speakerphone" style="font-size:17px;vertical-align:-3px;margin-right:4px"></i>벙 공지 템플릿</div>
    <div class="template-box" id="template-text">${template}</div>
    <div class="alert alert-info" style="margin-bottom:12px"><i class="ti ti-info-circle"></i>아래 버튼으로 복사 후 카카오톡에 붙여넣으세요.</div>

      <button class="btn" onclick="closeModal()">닫기</button>
      <button class="btn btn-primary" onclick="copyTemplate()"><i class="ti ti-copy"></i> 복사</button>
    </div>`);
}
function copyTemplate(){
  const text=document.getElementById('template-text').innerText;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=event.target.closest('button');
    btn.innerHTML='<i class="ti ti-check"></i> 복사됨!';
    setTimeout(()=>{btn.innerHTML='<i class="ti ti-copy"></i> 복사';},2000);
  });
}

// ── 참석자 입력 ───────────────────────────────────────────────────
function handleAttendeeInput(e,mode){if(e.key==='Enter'||e.key===','){e.preventDefault();handleAttendeeAdd(mode);}}
function handleAttendeeAdd(mode){
  const inputId=mode==='add'?'member-search':'member-search-edit';
  const input=document.getElementById(inputId);if(!input)return;
  const names=input.value.split(/[,،]/).map(n=>n.trim()).filter(Boolean);
  names.forEach(name=>{const m=members.find(x=>x.name===name);if(m)addAttendeeTag(m.id,m.name,mode);});
  input.value='';
}
function addAttendeeTag(id,name,mode){
  const tagArea=document.getElementById(`${mode}-tag-area`);
  const list=document.getElementById(`${mode}-attendee-list`);
  if(!tagArea)return;
  if(tagArea.querySelector(`[data-id="${id}"]`))return;
  const tag=document.createElement('span');
  tag.className='attendee-tag';tag.setAttribute('data-id',id);
  tag.innerHTML=`${name} <span style="cursor:pointer;margin-left:2px" onclick="removeAttendeeTag(this,'${mode}')">×</span>`;
  tagArea.appendChild(tag);
  if(list){const cb=list.querySelector(`.attend-check[value="${id}"]`);if(cb)cb.checked=true;}
}
function removeAttendeeTag(el,mode){
  const tag=el.parentElement;const id=tag.getAttribute('data-id');
  const list=document.getElementById(`${mode}-attendee-list`);
  tag.remove();
  if(list){const cb=list.querySelector(`.attend-check[value="${id}"]`);if(cb)cb.checked=false;}
}
function toggleAttendeeTag(label,mode){
  const id=label.getAttribute('data-id'),name=label.getAttribute('data-name');
  const cb=label.querySelector('.attend-check');
  const tagArea=document.getElementById(`${mode}-tag-area`);if(!tagArea)return;
  if(cb.checked){const tag=tagArea.querySelector(`[data-id="${id}"]`);if(tag)tag.remove();cb.checked=false;}
  else{addAttendeeTag(id,name,mode);}
}

    <div style="font-size:12px;color:var(--text2);margin-bottom:16px">초기화 후 드라이브 저장을 꼭 해주세요.</div>
    <div class="flex" style="justify-content:flex-end;gap:8px"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-danger" onclick="doReset()">초기화 실행</button></div>`);
